<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juraij | Portfolio</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.6);
            --primary-cyan: #00f2fe;
            --primary-purple: #4facfe;
            --text-main: #ffffff;
            --text-muted: #8f9cae;
            --glow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        h1, h2, h3, .logo {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Navigation */
        navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 12, 0.7);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary-cyan), var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s ease;
            position: relative;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-cyan);
            text-shadow: var(--glow);
        }

        /* Sections Styling */
        section {
            padding: 8rem 10% 4rem 10%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Hero Section */
        #hero {
            align-items: flex-start;
            position: relative;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-title span {
            color: var(--primary-cyan);
            text-shadow: var(--glow);
        }

        .typing-container {
            font-size: 2rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            height: 50px;
        }

        #typing-text {
            color: var(--primary-purple);
            font-weight: 600;
            border-right: 2px solid var(--primary-cyan);
            animation: blink 0.7s infinite;
        }

        .cta-btn {
            padding: 0.8rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: #000;
            background: linear-gradient(45deg, var(--primary-cyan), var(--primary-purple));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s ease;
            box-shadow: var(--glow);
            text-decoration: none;
            display: inline-block;
        }

        .cta-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.8);
        }

        /* Section Headings */
        .section-heading {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            position: relative;
            display: inline-block;
        }

        .section-heading::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 50px;
            height: 4px;
            background: var(--primary-cyan);
            border-radius: 2px;
        }

        /* About Section */
        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-text p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1.5rem;
        }

        .skill-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            transition: 0.4s ease;
        }

        .skill-card i {
            font-size: 2rem;
            color: var(--primary-cyan);
            margin-bottom: 0.8rem;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-cyan);
            box-shadow: var(--glow);
        }

        /* Projects Section */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 242, 254, 0.03));
            pointer-events: none;
        }

        .project-icon {
            font-size: 2.5rem;
            color: var(--primary-purple);
            margin-bottom: 1.5rem;
        }

        .project-card h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .project-card p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-purple);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.2);
        }

        /* Contact Section */
        .contact-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .form-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .form-group textarea {
            height: 150px;
            resize: none;
        }

        .form-group label {
            position: absolute;
            left: 1rem;
            top: 1rem;
            color: var(--text-muted);
            transition: 0.3s;
            pointer-events: none;
        }

        /* Floating Label Logic */
        .form-group input:focus ~ label,
        .form-group input:not(:placeholder-shown) ~ label,
        .form-group textarea:focus ~ label,
        .form-group textarea:not(:placeholder-shown) ~ label {
            top: -12px;
            left: 0.5rem;
            font-size: 0.8rem;
            color: var(--primary-cyan);
            background: #111215;
            padding: 0 0.5rem;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary-cyan);
            box-shadow: var(--glow);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 2px solid var(--primary-cyan);
            color: var(--primary-cyan);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: linear-gradient(45deg, var(--primary-cyan), var(--primary-purple));
            color: #000;
            box-shadow: var(--glow);
            border-color: transparent;
        }

        /* Animations */
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            navbar { padding: 1.5rem 5%; }
            section { padding: 6rem 5% 3rem 5%; }
            .hero-title { font-size: 2.8rem; }
            .typing-container { font-size: 1.5rem; }
            .about-content { grid-template-columns: 1fr; gap: 2rem; }
            .contact-container { padding: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Dynamic Interactive Particles Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navbar -->
    <navbar>
        <div class="logo">JURAIJ</div>
        <ul class="nav-links">
            <li><a href="#hero" class="nav-item active">Home</a></li>
            <li><a href="#about" class="nav-item">About</a></li>
            <li><a href="#projects" class="nav-item">Projects</a></li>
            <li><a href="#contact" class="nav-item">Contact</a></li>
        </ul>
    </navbar>

    <!-- Hero Section -->
    <section id="hero">
        <h1 class="hero-title">Hi, I'm <span>Juraij</span></h1>
        <div class="typing-container">
            A passionate <span id="typing-text"></span>
        </div>
        <a href="#about" class="cta-btn">Explore My World</a>
    </section>

    <!-- About Me Section -->
    <section id="about">
        <h2 class="section-heading">About Me</h2>
        <div class="about-content">
            <div class="about-text">
                <p>Welcome to my digital space. I am a tech enthusiast deeply invested in modern tech infrastructures, automation, and full-stack ecosystems. I thrive on solving complex system architectures and crafting seamless digital experiences.</p>
                <p>Constantly exploring the boundaries of scalable cloud networks and intelligent system optimization. Here are a few core focus areas in my stack:</p>
            </div>
            <div class="skills-grid">
                <div class="skill-card">
                    <i class="fa-solid fa-cloud"></i>
                    <h3>Cloud Systems</h3>
                </div>
                <div class="skill-card">
                    <i class="fa-solid fa-code"></i>
                    <h3>Programming</h3>
                </div>
                <div class="skill-card">
                    <i class="fa-solid fa-terminal"></i>
                    <h3>DevOps</h3>
                </div>
                <div class="skill-card">
                    <i class="fa-solid fa-microchip"></i>
                    <h3>AI Systems</h3>
                </div>
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects">
        <h2 class="section-heading">Featured Innovations</h2>
        <div class="projects-grid">
            <div class="project-card">
                <div class="project-icon"><i class="fa-solid fa-server"></i></div>
                <h3>Cloud Virtualization Node</h3>
                <p>Automated custom cloud workflows featuring fluid remote graphics interfaces and sandbox environments optimized for performance testing.</p>
            </div>
            <div class="project-card">
                <div class="project-icon"><i class="fa-solid fa-cubes"></i></div>
                <h3>Next-Gen UI Sandbox</h3>
                <p>Interactive single-page ecosystems utilizing high-performance rendering pipelines and real-time mouse tracking interfaces.</p>
            </div>
            <div class="project-card">
                <div class="project-icon"><i class="fa-solid fa-gears"></i></div>
                <h3>Automated Architecture</h3>
                <p>Robust backend configurations managed via CI/CD orchestration layers to automatically deploy and verify environments on the fly.</p>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h2 class="section-heading">Get In Touch</h2>
        <div class="contact-container">
            <form id="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                <div class="form-group">
                    <input type="text" id="name" placeholder=" " required>
                    <label for="name">Name</label>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>
                <div class="form-group">
                    <textarea id="message" placeholder=" " required></textarea>
                    <label for="message">Your Message</label>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Core JavaScript for Interactive Elements -->
    <script>
        // --- 1. Dynamic Typing Effect ---
        const words = ["Cloud Explorer.", "Tech Enthusiast.", "Problem Solver.", "Innovator."];
        let i = 0;
        let timer;

        function typingEffect() {
            let word = words[i].split("");
            var loopTyping = function() {
                if (word.length > 0) {
                    document.getElementById('typing-text').innerHTML += word.shift();
                } else {
                    setTimeout(deletingEffect, 2000);
                    return false;
                }
                timer = setTimeout(loopTyping, 100);
            };
            loopTyping();
        }

        function deletingEffect() {
            let word = words[i].split("");
            var loopDeleting = function() {
                if (word.length > 0) {
                    word.pop();
                    document.getElementById('typing-text').innerHTML = word.join("");
                } else {
                    if (words.length > (i + 1)) {
                        i++;
                    } else {
                        i = 0;
                    }
                    setTimeout(typingEffect, 500);
                    return false;
                }
                timer = setTimeout(loopDeleting, 50);
            };
            loopDeleting();
        }

        typingEffect();


        // --- 2. Interactive Canvas Background (Mouse Reactive Particles) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray;
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                // Mouse interaction / push away
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 3;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 3;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 3;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 3;
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((window.innerWidth - size * 2) - size * 2)) + size * 2;
                let y = (Math.random() * ((window.innerHeight - size * 2) - size * 2)) + size * 2;
                let directionX = (Math.random() * 0.4) - 0.2;
                let directionY = (Math.random() * 0.4) - 0.2;
                let color = 'rgba(0, 242, 254, 0.3)';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/9) * (canvas.height/9)) {
                        let alpha = 1 - (distance / 12000);
                        ctx.strokeStyle = `rgba(79, 172, 254, ${alpha * 0.12})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connectParticles();
        }

        // Initialize and start animation
        resizeCanvas();
        animateParticles();
    </script>
</body>
</html>
